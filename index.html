<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Symphony Archery</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="scorebar" aria-label="Game status">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Arrows</span>
          <strong id="arrows">12</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
        <div>
          <span class="label">Wind</span>
          <strong id="wind">Calm</strong>
        </div>
        <button id="audio" type="button" aria-label="Enable sound effects" aria-pressed="false">Audio Off</button>
        <button id="reset" type="button" aria-label="Reset round">Reset</button>
      </section>

      <canvas id="game" width="1200" height="720" aria-label="Archery game canvas"></canvas>

      <section class="touch-controls" aria-label="Touch controls">
        <button id="draw" type="button">Draw</button>
        <button id="fire" type="button">Fire</button>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
